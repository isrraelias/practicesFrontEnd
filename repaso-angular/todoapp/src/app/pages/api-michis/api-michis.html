<h1 class="title-page">Michi fotos ❤️</h1>
<section class="randombox-cat">
    @for(item of gatosphotos(); track item){
        <article class="randombox-cat__item">
            <img [src]="item" alt="gatito"/> 
            <button (click)="getFavoriteMichi()">❤️</button>
        </article>
    }
</section>
<section class="favoritebox-cat">
    @for(item of gatosphotosFavorite(); track item){
        <article class="randombox-cat__item">
            <img [src]="item" alt="gatito"/> 
            <button (click)="deleteFavoriteMichi()">✖️</button>
        </article>
    }
</section>
