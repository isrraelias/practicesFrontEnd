<section class="todoapp">
    <header class="header">
      <div class="container">
        <h2>My Day</h2>
        <p>All my tasks in one place</p>
        <input
          class="new-todo"
          placeholder="Type new todo"
          autofocus
          type="text"
          [formControl]="initialTask"
          (keydown.enter)="changeList()"
        />
          <!-- (change)="changeList($event)" estaba dentro del input-->
      </div>
    </header>
    <div class="container todoapp-wrapper">
      <!-- This section should be hidden by default and shown when there are todos -->
      <section class="main">

        <pre>
          {{filterStatus() | json}}
        </pre>

        <ul class="todo-list">
          <li 
          *ngFor="let task of tasksFiltered(); index as i" 
          (dblclick)="editTask(i)" 
          [class.completed]="task.completed"
          [class.editing]="task.editing">
            <div class="view">
              <input class="toggle" type="checkbox" [checked] = "task.completed" (click)="updateTaskStatus(i)" />
              <label>{{task.title}}</label>
              <button class="destroy" (click)="deleteTask(i)"></button>
            </div>
               <input 
               class="edit" 
               (keydown.enter)="updateTaskTitle(i, $event)" 
               [value]="task.title" />
          </li>
          
          <!-- <li>
            <div class="view">
              <input class="toggle" type="checkbox" />
              <label>Buy a unicorn</label>
              <button class="destroy"></button>
            </div>
            <input class="edit" value="Buy a unicorn" />
          </li>
-->
          <!-- <li class="editing">
            <div class="view">
              <input class="toggle" type="checkbox" />
              <label>Make dishes</label>
              <button class="destroy"></button>
            </div>
            <input class="edit" value="Make dishes" />
          </li>  -->
        </ul>
      </section>
      <!-- This footer should be hidden by default and shown when there are todos -->
      <footer class="footer">
        <!-- This should be `0 items left` by default -->
        <span class="todo-count"><strong>{{tasksFiltered().length}}</strong> 
          
          @if(tasksFiltered().length === 1){
            item
          }@else{
            items
          }
        </span>
        <!-- Remove this if you don't implement routing -->
        <ul class="filters">
          <li>
            <a (click)='functionChangeFilter("all")' [class.selected]="filterStatus() === 'all'">All</a>
          </li>
          <li>
            <a (click)='functionChangeFilter("pending")' [class.selected]="filterStatus() === 'pending'">Pending</a>
          </li>
          <li>
            <a (click)='functionChangeFilter("completed")' [class.selected]="filterStatus() === 'completed'">Completed</a>
          </li>
        </ul>
        <!-- Hidden if no completed items are left ↓ -->
        <button class="clear-completed">Clear completed</button>
      </footer>
    </div>
  </section>
